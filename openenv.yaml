name: smart-data-openenv
description: RL environment for data cleaning

tasks:
  - name: easy
    description: Remove duplicates from small dataset
    grader:
      type: reward
      target: 0.8

  - name: medium
    description: Remove duplicates from medium dataset
    grader:
      type: reward
      target: 0.8

  - name: hard
    description: Remove duplicates from large dataset
    grader:
      type: reward
      target: 0.8

actions:
  - name: remove_duplicates
  - name: fill_missing
  - name: outlier_clean

observation:
  type: dict
