name: smart-data-openenv
description: Data cleaning RL environment

tasks:
  - name: easy
    description: Remove duplicates from small dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

  - name: medium
    description: Remove duplicates from medium dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

  - name: hard
    description: Remove duplicates from large dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

actions:
  - name: remove_duplicates
  - name: fill_missing
  - name: outlier_clean

observation:
  type: dict
