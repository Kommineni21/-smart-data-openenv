name: smart-data-openenv
description: Data cleaning RL environment

tasks:
  easy:
    description: Remove duplicates from small dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

  medium:
    description: Remove duplicates from medium dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

  hard:
    description: Remove duplicates from large dataset
    grader:
      type: scalar
      min: 0.1
      max: 0.95

actions:
  - remove_duplicates
  - fill_missing
  - outlier_clean

observation:
  type: dict
